name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  test-lint-type-migrations:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pytest ruff mypy

      - name: Lint
        run: ruff check app tests --select F,E9

      - name: Type check
        run: mypy app/services app/routers app/main.py app/database.py --ignore-missing-imports --follow-imports=skip

      - name: Run tests
        run: pytest -q

      - name: Migration validity checks
        run: python scripts/check_migrations.py
