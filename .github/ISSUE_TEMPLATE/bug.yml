name: Bug
description: Bug report or defect
title: "[Bug]: "
labels: ["bug", "ready"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction steps
  - type: textarea
    id: acceptance
    attributes:
      label: Fix criteria
