<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Marge Care Workspace</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Lora:wght@500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --cream: #faf7f2;
      --sage: #5c7a5f;
      --sage-deep: #4b6550;
      --gold: #b08c4a;
      --rose: #b86a5d;
      --charcoal: #2c2c2c;
      --card: #fffdf9;
      --card-soft: #fffaf2;
      --border: rgba(92, 122, 95, 0.12);
      --shadow: 0 14px 34px rgba(44, 44, 44, 0.08);
      --soft-shadow: 0 8px 22px rgba(176, 140, 74, 0.1);
      --muted: #6e6a63;
      --accent-bg: rgba(176, 140, 74, 0.1);
      --sage-bg: rgba(92, 122, 95, 0.1);
      --rose-bg: rgba(184, 106, 93, 0.1);
      --radius-lg: 24px;
      --radius-md: 18px;
      --radius-sm: 12px;
    }

    * { box-sizing: border-box; }
    html, body { margin: 0; min-height: 100%; }
    body {
      font-family: 'Inter', sans-serif;
      background:
        radial-gradient(circle at top left, rgba(176, 140, 74, 0.12), transparent 28%),
        radial-gradient(circle at top right, rgba(92, 122, 95, 0.10), transparent 22%),
        var(--cream);
      color: var(--charcoal);
    }

    button, input, textarea { font: inherit; }

    .page {
      width: min(1160px, calc(100% - 32px));
      margin: 0 auto;
      padding: 42px 0 72px;
    }

    .hero {
      background: linear-gradient(145deg, rgba(255, 253, 249, 0.98), rgba(255, 250, 241, 0.94));
      border: 1px solid rgba(176, 140, 74, 0.16);
      border-radius: 32px;
      box-shadow: var(--shadow);
      padding: 36px 32px;
      margin-bottom: 22px;
      position: relative;
      overflow: hidden;
    }

    .hero::after {
      content: "";
      position: absolute;
      inset: auto -60px -60px auto;
      width: 180px;
      height: 180px;
      background: radial-gradient(circle, rgba(92, 122, 95, 0.12), transparent 70%);
      pointer-events: none;
    }

    .eyebrow {
      color: var(--sage);
      text-transform: uppercase;
      letter-spacing: 0.08em;
      font-size: 0.76rem;
      font-weight: 700;
      margin-bottom: 12px;
    }

    h1, h2, h3 {
      font-family: 'Lora', serif;
      margin: 0;
      color: var(--charcoal);
    }

    h1 {
      font-size: clamp(2.2rem, 3vw, 3.3rem);
      line-height: 1.1;
      max-width: 13ch;
    }

    .subhead {
      margin-top: 14px;
      color: var(--muted);
      font-size: 1rem;
      max-width: 64ch;
      line-height: 1.7;
    }

    .hero-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-top: 22px;
    }

    .hero-pill {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 10px 14px;
      border-radius: 999px;
      background: rgba(255, 253, 249, 0.88);
      border: 1px solid rgba(92, 122, 95, 0.1);
      color: var(--muted);
      font-size: 0.92rem;
    }

    .stats-strip {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 14px;
      margin-bottom: 22px;
    }

    .stat-card {
      background: linear-gradient(180deg, rgba(255, 253, 249, 0.98), rgba(255, 250, 241, 0.96));
      border: 1px solid rgba(176, 140, 74, 0.14);
      border-radius: 22px;
      box-shadow: var(--soft-shadow);
      padding: 18px;
    }

    .stat-label {
      font-size: 0.84rem;
      letter-spacing: 0.03em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 10px;
      font-weight: 700;
    }

    .stat-value {
      font-family: 'Lora', serif;
      font-size: 2rem;
      line-height: 1;
      margin-bottom: 10px;
    }

    .stat-context {
      font-size: 0.92rem;
      color: var(--muted);
      line-height: 1.5;
    }

    .cards {
      display: grid;
      gap: 22px;
    }

    .card {
      background: var(--card);
      border-radius: var(--radius-lg);
      padding: 24px;
      box-shadow: var(--shadow);
      border: 1px solid var(--border);
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 18px;
      margin-bottom: 18px;
    }

    .card-title {
      font-size: 1.45rem;
      margin-bottom: 6px;
    }

    .card-description {
      color: var(--muted);
      font-size: 0.98rem;
      line-height: 1.6;
      margin: 0;
    }

    .count-badge {
      flex-shrink: 0;
      min-width: 44px;
      text-align: center;
      padding: 10px 12px;
      border-radius: 999px;
      background: var(--accent-bg);
      color: var(--gold);
      font-weight: 700;
    }

    .queue-grid {
      display: grid;
      grid-template-columns: 1.15fr 0.85fr;
      gap: 22px;
      align-items: start;
    }

    .list {
      display: grid;
      gap: 12px;
    }

    .row {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 16px;
      padding: 18px;
      border-radius: var(--radius-md);
      background: linear-gradient(180deg, rgba(250, 247, 242, 0.95), rgba(255, 255, 255, 0.98));
      border: 1px solid rgba(92, 122, 95, 0.1);
    }

    .row.overdue { border-color: rgba(184, 106, 93, 0.18); background: linear-gradient(180deg, rgba(255, 246, 243, 0.98), rgba(255, 255, 255, 0.98)); }
    .row.today { border-color: rgba(176, 140, 74, 0.2); background: linear-gradient(180deg, rgba(255, 250, 241, 0.98), rgba(255, 255, 255, 0.98)); }
    .row.resolved { opacity: 0.95; }

    .row-main { min-width: 0; }

    .row-topline {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }

    .row-main strong {
      display: block;
      font-size: 1rem;
    }

    .kind-pill,
    .timing-pill {
      display: inline-flex;
      align-items: center;
      border-radius: 999px;
      padding: 5px 10px;
      font-size: 0.76rem;
      font-weight: 700;
      letter-spacing: 0.02em;
    }

    .kind-pill { background: var(--sage-bg); color: var(--sage-deep); }
    .timing-pill { background: var(--accent-bg); color: #8d6d33; }
    .timing-pill.overdue { background: var(--rose-bg); color: var(--rose); }

    .context {
      color: var(--muted);
      line-height: 1.6;
      font-size: 0.95rem;
    }

    .meta {
      display: flex;
      flex-wrap: wrap;
      gap: 8px 12px;
      margin-top: 10px;
      color: var(--muted);
      font-size: 0.84rem;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 8px;
      max-width: 280px;
    }

    .btn {
      border: none;
      padding: 10px 14px;
      border-radius: 999px;
      font-weight: 600;
      cursor: pointer;
      transition: transform 120ms ease, opacity 120ms ease, background 120ms ease;
      white-space: nowrap;
    }

    .btn:hover,
    .btn:focus-visible {
      transform: translateY(-1px);
      outline: none;
    }

    .btn-primary {
      background: var(--sage);
      color: white;
      box-shadow: var(--soft-shadow);
    }

    .btn-primary:hover,
    .btn-primary:focus-visible { background: var(--sage-deep); }

    .btn-soft {
      background: rgba(92, 122, 95, 0.08);
      color: var(--sage-deep);
    }

    .btn-warm {
      background: rgba(176, 140, 74, 0.12);
      color: #8b6a2d;
    }

    .nudge { background: linear-gradient(135deg, rgba(176, 140, 74, 0.13), rgba(255, 253, 249, 0.92)); border: 1px solid rgba(176, 140, 74, 0.18); box-shadow: var(--soft-shadow); }
    .nudge-copy { color: var(--charcoal); font-size: 1.02rem; line-height: 1.8; }

    .warm-empty {
      padding: 20px 18px;
      border-radius: var(--radius-md);
      border: 1px dashed rgba(92, 122, 95, 0.18);
      background: rgba(255, 253, 249, 0.88);
      color: var(--muted);
      line-height: 1.6;
    }

    .composer {
      position: sticky;
      top: 18px;
    }

    .composer-card {
      background: linear-gradient(180deg, rgba(255, 253, 249, 0.98), rgba(255, 250, 241, 0.98));
    }

    .chat-shell {
      display: grid;
      gap: 14px;
    }

    .chat-response {
      min-height: 88px;
      border-radius: 18px;
      padding: 16px;
      background: rgba(250, 247, 242, 0.9);
      border: 1px solid rgba(92, 122, 95, 0.1);
      color: var(--charcoal);
      line-height: 1.65;
    }

    .chat-input {
      width: 100%;
      border: 1px solid rgba(92, 122, 95, 0.16);
      border-radius: 18px;
      padding: 14px 16px;
      min-height: 104px;
      resize: vertical;
      background: rgba(255, 255, 255, 0.86);
      color: var(--charcoal);
    }

    .chat-input:focus-visible {
      outline: 2px solid rgba(92, 122, 95, 0.18);
      border-color: rgba(92, 122, 95, 0.24);
    }

    .composer-actions {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .composer-hint {
      color: var(--muted);
      font-size: 0.88rem;
      line-height: 1.5;
    }

    .status {
      text-align: center;
      padding: 44px 24px;
      color: var(--muted);
      background: rgba(255, 253, 249, 0.82);
      border: 1px dashed rgba(92, 122, 95, 0.22);
      border-radius: var(--radius-lg);
      box-shadow: var(--shadow);
    }

    .hidden { display: none !important; }

    .skeleton-hero,
    .skeleton-card,
    .skeleton-line {
      position: relative;
      overflow: hidden;
      background: linear-gradient(90deg, rgba(255,255,255,0.45) 25%, rgba(255,255,255,0.82) 50%, rgba(255,255,255,0.45) 75%);
      background-size: 200% 100%;
      animation: pulse 1.8s ease-in-out infinite;
    }

    .skeleton-hero {
      height: 220px;
      border-radius: 32px;
      margin-bottom: 22px;
      background-color: rgba(92, 122, 95, 0.12);
    }

    .skeleton-card {
      height: 150px;
      border-radius: var(--radius-lg);
      background-color: rgba(176, 140, 74, 0.1);
    }

    .skeleton-line {
      height: 14px;
      border-radius: 999px;
      margin-bottom: 10px;
      background-color: rgba(92, 122, 95, 0.08);
    }

    @keyframes pulse {
      0% { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    @media (max-width: 980px) {
      .stats-strip,
      .queue-grid { grid-template-columns: 1fr; }
      .composer { position: static; }
    }

    @media (max-width: 720px) {
      .page { width: min(100% - 20px, 1100px); padding-top: 24px; }
      .hero, .card { padding: 22px 18px; }
      .row { flex-direction: column; }
      .actions { justify-content: flex-start; max-width: none; }
      .stats-strip { grid-template-columns: 1fr 1fr; }
    }

    @media (max-width: 520px) {
      .stats-strip { grid-template-columns: 1fr; }
      .card-header { flex-direction: column; }
      .count-badge { align-self: flex-start; }
    }
  </style>
</head>
<body>
  <main class="page">
    <div id="loadingState" aria-hidden="true">
      <div class="skeleton-hero"></div>
      <div class="stats-strip">
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
        <div class="skeleton-card"></div>
      </div>
      <div class="queue-grid">
        <div class="cards">
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
        </div>
        <div class="cards">
          <div class="skeleton-card"></div>
          <div class="skeleton-card"></div>
        </div>
      </div>
    </div>

    <div id="errorState" class="status hidden">Marge had trouble pulling today’s care workspace. Please try again in a moment.</div>
    <div id="emptyState" class="status hidden">It looks like your flock is well-tended today, Pastor.</div>

    <section id="workspace" class="hidden">
      <section class="hero">
        <div class="eyebrow">Marge Care Workspace</div>
        <h1 id="greeting">Good morning.</h1>
        <p id="subhead" class="subhead">A gentle look at who may need care and follow-up today.</p>
        <div id="heroMeta" class="hero-meta"></div>
      </section>

      <section id="statsStrip" class="stats-strip"></section>

      <section class="queue-grid">
        <div class="cards" id="mainColumn"></div>
        <aside class="cards composer" id="sideColumn"></aside>
      </section>
    </section>
  </main>

  <script>
    const BASE_URL = window.location.origin;
    const BRIEFING_URL = BASE_URL + '/briefing/today';
    const CARE_URL = BASE_URL + '/care/';
    const PRAYERS_URL = BASE_URL + '/care/prayers/';
    const MEMBERS_URL = BASE_URL + '/members/';
    const VISITORS_URL = BASE_URL + '/visitors/';
    const CHAT_URL = BASE_URL + '/chat/';

    const loadingState = document.getElementById('loadingState');
    const errorState = document.getElementById('errorState');
    const emptyState = document.getElementById('emptyState');
    const workspace = document.getElementById('workspace');
    const greetingEl = document.getElementById('greeting');
    const subheadEl = document.getElementById('subhead');
    const heroMetaEl = document.getElementById('heroMeta');
    const statsStripEl = document.getElementById('statsStrip');
    const mainColumnEl = document.getElementById('mainColumn');
    const sideColumnEl = document.getElementById('sideColumn');

    const formatDate = (value) => {
      if (!value) return 'recently';
      const parsed = new Date(value);
      if (Number.isNaN(parsed.getTime())) return value;
      return parsed.toLocaleDateString(undefined, { month: 'short', day: 'numeric' });
    };

    const daysAgo = (value) => {
      if (!value) return null;
      const parsed = new Date(value);
      if (Number.isNaN(parsed.getTime())) return null;
      const now = new Date();
      parsed.setHours(0, 0, 0, 0);
      now.setHours(0, 0, 0, 0);
      return Math.round((now - parsed) / 86400000);
    };

    const pluralize = (count, singular, plural = singular + 's') => `${count} ${count === 1 ? singular : plural}`;

    const stripText = (value, fallback = '') => {
      if (!value) return fallback;
      return String(value).replace(/\s+/g, ' ').trim();
    };

    const draftTemplates = {
      birthday: (name) => `Draft a warm birthday text for ${name} from Pastor. Keep it brief, pastoral, and personal.`,
      anniversary: (name) => `Draft a warm anniversary note for ${name} from Pastor. Keep it grateful and pastoral.`,
      absent: (name) => `Draft a short caring text to ${name}. Let them know they have been missed and gently invite conversation if needed.`,
      visitor: (name) => `Draft a warm visitor follow-up text for ${name}. Keep it gracious, welcoming, and pastoral.`,
      prayer: (name) => `Draft a pastoral message checking in with ${name} about their prayer request and asking how things are now.`,
      care: (name, context) => `Draft a pastoral care text for ${name}. Context: ${context || 'ongoing care need'}. Keep it warm, direct, and prayerful.`,
      queue: (name, context) => `Draft a warm pastoral follow-up for ${name}. Context: ${context || 'care follow-up'}. Keep it human, concise, and gentle.`
    };

    const safeFetchJson = (url) => fetch(url, { headers: { Accept: 'application/json' } }).then((response) => {
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      return response.json();
    });

    const makeHeroPill = (label, value) => {
      const pill = document.createElement('div');
      pill.className = 'hero-pill';
      pill.textContent = `${label}: ${value}`;
      return pill;
    };

    const makeStatCard = (label, value, context) => {
      const card = document.createElement('section');
      card.className = 'stat-card';
      card.innerHTML = `
        <div class="stat-label">${label}</div>
        <div class="stat-value">${value}</div>
        <div class="stat-context">${context}</div>
      `;
      return card;
    };

    const makeButton = (label, className, onClick) => {
      const button = document.createElement('button');
      button.className = `btn ${className}`;
      button.type = 'button';
      button.textContent = label;
      button.addEventListener('click', onClick);
      return button;
    };

    const postChat = async (message) => {
      const response = await fetch(CHAT_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
        body: JSON.stringify({ message, pastor_name: 'Pastor' })
      });
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      return response.json();
    };

    const markVisitorContacted = async (item) => {
      const payload = {};
      if (item.stage === 'day1') payload.follow_up_day1_sent = true;
      if (item.stage === 'day3') payload.follow_up_day3_sent = true;
      if (item.stage === 'week2') payload.follow_up_week2_sent = true;
      const response = await fetch(`${VISITORS_URL}${item.id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
        body: JSON.stringify(payload)
      });
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      return response.json();
    };

    const markCareContacted = async (item) => {
      const response = await fetch(`${CARE_URL}${item.id}/contact`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
        body: JSON.stringify({ note: 'Contacted from the care queue.' })
      });
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      return response.json();
    };

    const markPrayerUpdated = async (item) => {
      const response = await fetch(`${PRAYERS_URL}${item.id}`, {
        method: 'PATCH',
        headers: { 'Content-Type': 'application/json', Accept: 'application/json' },
        body: JSON.stringify({ status: 'answered' })
      });
      if (!response.ok) throw new Error(`HTTP ${response.status}`);
      return response.json();
    };

    const makeQueueRow = (item, refreshWorkspace) => {
      const row = document.createElement('div');
      row.className = `row ${item.bucketClass || ''}`.trim();

      const main = document.createElement('div');
      main.className = 'row-main';

      const topline = document.createElement('div');
      topline.className = 'row-topline';

      const name = document.createElement('strong');
      name.textContent = item.title;

      const kind = document.createElement('span');
      kind.className = 'kind-pill';
      kind.textContent = item.kindLabel;

      const timing = document.createElement('span');
      timing.className = `timing-pill ${item.isOverdue ? 'overdue' : ''}`.trim();
      timing.textContent = item.timingLabel;

      topline.append(name, kind, timing);

      const context = document.createElement('div');
      context.className = 'context';
      context.textContent = item.context;

      const meta = document.createElement('div');
      meta.className = 'meta';
      (item.meta || []).filter(Boolean).forEach((value) => {
        const span = document.createElement('span');
        span.textContent = value;
        meta.appendChild(span);
      });

      main.append(topline, context);
      if (meta.childNodes.length) main.appendChild(meta);

      const actions = document.createElement('div');
      actions.className = 'actions';

      actions.appendChild(makeButton('Draft a text', 'btn-primary', async () => {
        try {
          const reply = await postChat(item.draftPrompt || draftTemplates.queue(item.title, item.context));
          alert(reply.reply || 'Draft ready in Marge chat.');
        } catch (error) {
          alert('Marge could not draft that message just now.');
        }
      }));

      actions.appendChild(makeButton('Tell Marge', 'btn-soft', () => {
        const input = document.getElementById('chatInput');
        if (input) {
          input.value = `Marge, update ${item.title}: `;
          input.focus();
        }
      }));

      actions.appendChild(makeButton('Add note', 'btn-soft', () => {
        const input = document.getElementById('chatInput');
        if (input) {
          input.value = `Add a note for ${item.title}: `;
          input.focus();
        }
      }));

      if (item.markAction) {
        actions.appendChild(makeButton('Mark contacted', 'btn-warm', async () => {
          try {
            await item.markAction(item);
            await refreshWorkspace();
          } catch (error) {
            alert('I could not mark that update just now.');
          }
        }));
      }

      row.append(main, actions);
      return row;
    };

    const makeSectionCard = (title, description, items, refreshWorkspace, extraClass = '') => {
      const card = document.createElement('section');
      card.className = `card ${extraClass}`.trim();

      const header = document.createElement('div');
      header.className = 'card-header';

      const copy = document.createElement('div');
      const heading = document.createElement('h2');
      heading.className = 'card-title';
      heading.textContent = title;
      const desc = document.createElement('p');
      desc.className = 'card-description';
      desc.textContent = description;
      copy.append(heading, desc);

      const badge = document.createElement('div');
      badge.className = 'count-badge';
      badge.textContent = items.length;

      header.append(copy, badge);
      card.appendChild(header);

      if (!items.length) {
        const empty = document.createElement('div');
        empty.className = 'warm-empty';
        empty.textContent = title === 'Recently Resolved'
          ? 'No recently resolved care notes are showing yet. When a loop closes, Marge can hold that gratitude here.'
          : 'Nothing is sitting here right now. That is a gentle grace today.';
        card.appendChild(empty);
        return card;
      }

      const list = document.createElement('div');
      list.className = 'list';
      items.forEach((item) => list.appendChild(makeQueueRow(item, refreshWorkspace)));
      card.appendChild(list);
      return card;
    };

    const makeNudgeCard = (nudges) => {
      const card = document.createElement('section');
      card.className = 'card nudge';
      card.innerHTML = `
        <h2 class="card-title">💭 Today's Nudge</h2>
        <div class="nudge-copy">${nudges.map((nudge) => `<p>${nudge}</p>`).join('')}</div>
      `;
      return card;
    };

    const makeComposerCard = (briefing) => {
      const card = document.createElement('section');
      card.className = 'card composer-card';
      card.innerHTML = `
        <div class="card-header">
          <div>
            <h2 class="card-title">Tell Marge</h2>
            <p class="card-description">Log a visit, close a loop, or ask for help drafting the next text.</p>
          </div>
        </div>
      `;

      const shell = document.createElement('div');
      shell.className = 'chat-shell';

      const responseBox = document.createElement('div');
      responseBox.className = 'chat-response';
      responseBox.id = 'chatResponse';
      responseBox.textContent = `I'm here, Pastor. You can tell me about a visit, an answered prayer, or who needs a note today.`;

      const input = document.createElement('textarea');
      input.className = 'chat-input';
      input.id = 'chatInput';
      input.placeholder = 'Tell Marge something... e.g. I visited Martha today and she is doing a little better.';

      const actions = document.createElement('div');
      actions.className = 'composer-actions';

      const hint = document.createElement('div');
      hint.className = 'composer-hint';
      hint.textContent = `Today's briefing includes ${pluralize((briefing.active_care_cases || []).length, 'active care case')} and ${pluralize((briefing.visitors_needing_followup || []).length, 'visitor')} needing follow-up.`;

      const sendButton = makeButton('Send to Marge', 'btn-primary', async () => {
        const message = input.value.trim();
        if (!message) return;
        sendButton.disabled = true;
        sendButton.textContent = 'Sending…';
        try {
          const reply = await postChat(message);
          responseBox.textContent = reply.reply || 'Marge has that noted.';
          input.value = '';
        } catch (error) {
          responseBox.textContent = 'I had trouble sending that to Marge just now. Please try again.';
        } finally {
          sendButton.disabled = false;
          sendButton.textContent = 'Send to Marge';
        }
      });

      actions.append(hint, sendButton);
      shell.append(responseBox, input, actions);
      card.appendChild(shell);
      return card;
    };

    const buildQueue = ({ briefing, careCases, prayers, members, visitors }) => {
      const today = [];
      const overdue = [];
      const active = [];
      const resolved = [];

      const addItem = (item) => {
        if (item.group === 'resolved') resolved.push(item);
        else if (item.group === 'overdue') overdue.push(item);
        else if (item.group === 'today') today.push(item);
        else active.push(item);
      };

      (careCases || []).forEach((care) => {
        const age = daysAgo(care.last_contact || care.created_at);
        const isOverdue = age !== null && age > 7;
        const isToday = age === null || age >= 5;
        addItem({
          id: care.id,
          title: care.member_name || 'Care case',
          kindLabel: 'Care case',
          timingLabel: isOverdue ? `${age} days since contact` : age === null ? 'Needs first touch' : age >= 0 ? `${age} days since contact` : 'In progress',
          context: stripText(care.description, 'Ongoing pastoral care need.'),
          meta: [care.category ? `Category: ${care.category}` : null, care.last_contact ? `Last contact ${formatDate(care.last_contact)}` : 'No contact logged yet'],
          isOverdue,
          bucketClass: isOverdue ? 'overdue' : isToday ? 'today' : '',
          group: isOverdue ? 'overdue' : isToday ? 'today' : 'active',
          draftPrompt: draftTemplates.care(care.member_name || 'this person', care.description),
          markAction: markCareContacted
        });
      });

      (visitors || []).forEach((visitor) => {
        const visitAge = daysAgo(visitor.visit_date);
        let stage = null;
        let timingLabel = 'In follow-up';
        let group = 'active';
        if (!visitor.follow_up_day1_sent) {
          stage = 'day1';
          timingLabel = visitAge > 0 ? `Day 1 follow-up is late` : 'Welcome today';
          group = visitAge > 0 ? 'overdue' : 'today';
        } else if (!visitor.follow_up_day3_sent && visitAge >= 3) {
          stage = 'day3';
          timingLabel = visitAge > 3 ? `Day 3 follow-up is late` : 'Follow-up due today';
          group = visitAge > 3 ? 'overdue' : 'today';
        } else if (!visitor.follow_up_week2_sent && visitAge >= 14) {
          stage = 'week2';
          timingLabel = visitAge > 14 ? `Two-week touch is late` : 'Two-week touch due today';
          group = visitAge > 14 ? 'overdue' : 'today';
        } else if (!(visitor.follow_up_day1_sent && visitor.follow_up_day3_sent && visitor.follow_up_week2_sent)) {
          stage = visitor.follow_up_day3_sent ? 'week2' : 'day3';
          timingLabel = `Visited ${formatDate(visitor.visit_date)}`;
          group = 'active';
        }

        if (!stage) return;

        addItem({
          id: visitor.id,
          title: visitor.full_name,
          kindLabel: 'Visitor follow-up',
          timingLabel,
          context: stripText(visitor.notes, `Visited on ${formatDate(visitor.visit_date)}. A warm follow-up would help them feel remembered.`),
          meta: [`Visit date ${formatDate(visitor.visit_date)}`, visitor.source ? `Source: ${visitor.source}` : null],
          isOverdue: group === 'overdue',
          bucketClass: group === 'overdue' ? 'overdue' : group === 'today' ? 'today' : '',
          group,
          stage,
          draftPrompt: draftTemplates.visitor(visitor.full_name),
          markAction: markVisitorContacted
        });
      });

      (members || []).forEach((member) => {
        const absenceDays = daysAgo(member.last_attendance);
        if (absenceDays === null || absenceDays < 21) return;
        const group = absenceDays > 35 ? 'overdue' : absenceDays >= 28 ? 'today' : 'active';
        addItem({
          id: member.id,
          title: member.full_name,
          kindLabel: 'Absent member',
          timingLabel: `${absenceDays} days since attendance`,
          context: `You have not seen ${member.full_name.split(' ')[0]} in a little while. A simple touch may help them feel remembered.`,
          meta: [member.last_attendance ? `Last attended ${formatDate(member.last_attendance)}` : 'No attendance date available'],
          isOverdue: group === 'overdue',
          bucketClass: group === 'overdue' ? 'overdue' : group === 'today' ? 'today' : '',
          group,
          draftPrompt: draftTemplates.absent(member.full_name)
        });
      });

      (prayers || []).forEach((prayer) => {
        const prayerAge = daysAgo(prayer.created_at || prayer.updated_at);
        if (prayer.status && prayer.status !== 'active') {
          resolved.push({
            id: prayer.id,
            title: prayer.submitted_by || 'Prayer request',
            kindLabel: 'Resolved prayer',
            timingLabel: prayer.status === 'answered' ? 'Answered prayer' : 'Closed request',
            context: stripText(prayer.request_text, 'A prayer loop was recently closed.'),
            meta: [prayer.updated_at ? `Updated ${formatDate(prayer.updated_at)}` : null],
            bucketClass: 'resolved',
            group: 'resolved',
            draftPrompt: draftTemplates.prayer(prayer.submitted_by || 'them')
          });
          return;
        }
        if (prayerAge !== null && prayerAge < 14) return;
        const group = prayerAge > 21 ? 'overdue' : prayerAge >= 14 ? 'today' : 'active';
        addItem({
          id: prayer.id,
          title: prayer.submitted_by || 'Prayer request',
          kindLabel: 'Prayer follow-up',
          timingLabel: prayerAge ? `${prayerAge} days since request` : 'Needs update',
          context: stripText(prayer.request_text, 'A prayer update may be due.'),
          meta: [prayer.is_private ? 'Private request' : 'Share carefully', prayer.created_at ? `Submitted ${formatDate(prayer.created_at)}` : null],
          isOverdue: group === 'overdue',
          bucketClass: group === 'overdue' ? 'overdue' : group === 'today' ? 'today' : '',
          group,
          draftPrompt: draftTemplates.prayer(prayer.submitted_by || 'them'),
          markAction: markPrayerUpdated
        });
      });

      const sortByUrgency = (a, b) => a.title.localeCompare(b.title);
      [today, overdue, active, resolved].forEach((group) => group.sort(sortByUrgency));
      return { today, overdue, active, resolved };
    };

    const renderWorkspace = async () => {
      const [briefing, careCases, prayers, members, visitors] = await Promise.all([
        safeFetchJson(BRIEFING_URL),
        safeFetchJson(CARE_URL),
        safeFetchJson(PRAYERS_URL),
        safeFetchJson(MEMBERS_URL),
        safeFetchJson(VISITORS_URL)
      ]);

      greetingEl.textContent = briefing.greeting || 'Good morning.';
      const pastorName = briefing.pastor_name || 'Pastor';
      const churchName = briefing.church_name ? ` at ${briefing.church_name}` : '';
      subheadEl.textContent = `Here’s a gentle look at who may need care and follow-up today, ${pastorName}${churchName}.`;

      heroMetaEl.innerHTML = '';
      heroMetaEl.append(
        makeHeroPill('Generated', briefing.generated_at || 'Today'),
        makeHeroPill('Care posture', 'Warm, present, attentive'),
        makeHeroPill('Open loops', pluralize((careCases || []).filter((item) => item.status === 'active').length + (visitors || []).length, 'person'))
      );

      const queue = buildQueue({ briefing, careCases: (careCases || []).filter((item) => item.status === 'active'), prayers: prayers || [], members: members || [], visitors: visitors || [] });

      statsStripEl.innerHTML = '';
      statsStripEl.append(
        makeStatCard('Visitors Needing Follow-Up', (visitors || []).filter((v) => !v.follow_up_day1_sent || !v.follow_up_day3_sent || !v.follow_up_week2_sent).length, 'New faces waiting on a thoughtful next touch.'),
        makeStatCard('Active Care Cases', (careCases || []).filter((item) => item.status === 'active').length, 'Ongoing pastoral situations already in motion.'),
        makeStatCard('Absent Members', (members || []).filter((member) => (daysAgo(member.last_attendance) || 0) >= 21).length, 'People you may want to gently check on.'),
        makeStatCard('Prayer Requests Needing Update', (prayers || []).filter((prayer) => prayer.status === 'active' && (daysAgo(prayer.created_at || prayer.updated_at) || 0) >= 14).length, 'Requests that may need a fresh word or update.')
      );

      mainColumnEl.innerHTML = '';
      mainColumnEl.append(
        makeSectionCard('Morning Briefing', 'Keep the shape of the morning in view before you step into the queue.', [
          ...((briefing.birthdays_this_week || []).map((person) => ({
            title: person.full_name,
            kindLabel: 'Birthday',
            timingLabel: formatDate(person.birthday),
            context: `${person.full_name.split(' ')[0]}'s birthday is coming this week.`,
            meta: [person.phone ? 'Text-ready' : null],
            draftPrompt: draftTemplates.birthday(person.full_name),
            bucketClass: '',
            group: 'active'
          }))),
          ...((briefing.anniversaries_this_week || []).map((person) => ({
            title: person.full_name,
            kindLabel: 'Anniversary',
            timingLabel: formatDate(person.anniversary),
            context: `A good day to bless ${person.full_name.split(' ')[0]} and celebrate their marriage.`,
            meta: [person.phone ? 'Text-ready' : null],
            draftPrompt: draftTemplates.anniversary(person.full_name),
            bucketClass: '',
            group: 'active'
          })))
        ], renderWorkspace),
        makeSectionCard('Due Today', 'These are the touches that would be especially good to make today.', queue.today, renderWorkspace),
        makeSectionCard('Overdue', 'These items feel a little stale and may need gentle attention first.', queue.overdue, renderWorkspace),
        makeSectionCard('Active Queue', 'Open care loops that are still in motion, even if they are not urgent today.', queue.active, renderWorkspace),
        makeSectionCard('Recently Resolved', 'Closed loops and answered prayers can land here as gratitude accumulates.', queue.resolved, renderWorkspace)
      );

      sideColumnEl.innerHTML = '';
      sideColumnEl.append(makeComposerCard(briefing));
      if (Array.isArray(briefing.nudges) && briefing.nudges.length) {
        sideColumnEl.append(makeNudgeCard(briefing.nudges));
      }

      const totalVisible = queue.today.length + queue.overdue.length + queue.active.length + queue.resolved.length + (briefing.birthdays_this_week || []).length + (briefing.anniversaries_this_week || []).length;
      loadingState.classList.add('hidden');
      errorState.classList.add('hidden');

      if (totalVisible === 0) {
        workspace.classList.add('hidden');
        emptyState.classList.remove('hidden');
        return;
      }

      emptyState.classList.add('hidden');
      workspace.classList.remove('hidden');
    };

    const showError = () => {
      loadingState.classList.add('hidden');
      workspace.classList.add('hidden');
      emptyState.classList.add('hidden');
      errorState.classList.remove('hidden');
    };

    renderWorkspace().catch(showError);
  </script>
</body>
</html>
